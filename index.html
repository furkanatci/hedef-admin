<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f5f5;
    font-family: 'Segoe UI', sans-serif;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-size: 1.4rem; font-weight: 700;
    margin-bottom: 1.5rem; color: #111;
    border-bottom: 2px solid #111; padding-bottom: 0.6rem;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
    max-width: 1200px;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 1.4rem;
  }

  .card h2 {
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: #999; margin-bottom: 1rem;
  }

  textarea {
    width: 100%; min-height: 100px;
    border: 1px solid #ddd; border-radius: 6px;
    padding: 0.7rem; font-size: 1rem;
    font-family: inherit; resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #333; }

  input[type="text"], input[type="time"], input[type="color"] {
    padding: 0.55rem 0.8rem;
    border: 1px solid #ddd; border-radius: 6px;
    font-size: 0.95rem; outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #333; }

  .btn-row { display: flex; gap: 0.6rem; margin-top: 0.8rem; flex-wrap: wrap; }

  button {
    padding: 0.6rem 1.2rem; border: none; border-radius: 6px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.8; }
  .btn-primary { background: #111; color: #fff; flex: 1; }
  .btn-danger  { background: #fee2e2; color: #cc0000; }
  .btn-green   { background: #dcfce7; color: #16a34a; }
  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.8rem; }

  #send-status { margin-top: 0.6rem; font-size: 0.8rem; color: #999; min-height: 1.2em; }
  #send-status.ok  { color: #16a34a; }
  #send-status.err { color: #cc0000; }

  .current-val {
    margin-top: 1rem; padding: 0.8rem;
    background: #f9f9f9; border-radius: 6px; border: 1px solid #ececec;
  }
  .current-val label {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1px; color: #aaa; display: block; margin-bottom: 0.3rem;
  }
  #current-text { font-size: 1.6rem; font-weight: 700; color: #111; word-break: break-all; }
  #current-text.empty { color: #ccc; font-size: 0.9rem; font-weight: 400; }

  /* geçmiş & gerçekleşen listeler */
  .scroll-list {
    list-style: none;
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 1rem;
  }
  .scroll-list li {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0.55rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem;
  }
  .scroll-list li:last-child { border-bottom: none; }
  .scroll-list .val { font-weight: 600; }
  .scroll-list .val.green { color: #16a34a; }
  .scroll-list .time { font-size: 0.72rem; color: #bbb; white-space: nowrap; margin-left: 0.8rem; }
  .scroll-list .empty-msg { color: #ccc; font-size: 0.85rem; }

  .input-row { display: flex; gap: 0.5rem; margin-top: 0.4rem; flex-wrap: wrap; }
  .input-row input[type="text"] { flex: 1; min-width: 80px; }

  /* renk aralıkları */
  .renk-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto auto auto;
    gap: 0.4rem;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.85rem;
  }
  .renk-row:last-child { border-bottom: none; }
  .renk-row .renk-preview {
    width: 20px; height: 20px; border-radius: 4px;
    border: 1px solid #ddd; display: inline-block; flex-shrink: 0;
  }
  .renk-ekle-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto auto;
    gap: 0.5rem; align-items: center;
    margin-top: 0.8rem; padding-top: 0.8rem;
    border-top: 1px solid #f0f0f0;
  }
  .renk-ekle-form label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  input[type="color"] { width: 48px; height: 36px; padding: 2px; cursor: pointer; }
  #renk-list { list-style: none; max-height: 260px; overflow-y: auto; }
  #renk-empty { color: #ccc; font-size: 0.85rem; padding: 0.4rem 0; }
</style>
</head>
<body>

<h1>Admin Panel</h1>

<div class="grid">

  <!-- SÜTUN 1: Hedef gönder -->
  <div class="card">
    <h2>Hedef Gönder</h2>
    <textarea id="msg" placeholder="Ekrana yansıtılacak metin..." maxlength="300"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="send()">▶ Gönder</button>
      <button class="btn-danger" onclick="clearScreen()">Sil</button>
    </div>
    <div id="send-status"></div>

    <div class="current-val">
      <label>Ekrandaki mevcut değer</label>
      <div id="current-text" class="empty">—</div>
    </div>

    <div style="margin-top:1.2rem">
      <h2 style="margin-bottom:0.8rem">Geçmiş (gün gün)</h2>
      <ul id="history-list" class="scroll-list">
        <li><span class="empty-msg">Yükleniyor...</span></li>
      </ul>
    </div>
  </div>

  <!-- SÜTUN 2: Gerçekleşen -->
  <div class="card">
    <h2>Gerçekleşen</h2>
    <ul id="actual-list" class="scroll-list">
      <li><span class="empty-msg">Henüz giriş yok.</span></li>
    </ul>
    <h2 style="margin-bottom:0.6rem">Yeni Gerçekleşen Ekle</h2>
    <div class="input-row">
      <input type="text" id="actual-input" placeholder="Değer gir...">
      <button class="btn-green" onclick="addActual()">+ Ekle</button>
    </div>
  </div>

  <!-- SÜTUN 3: Arka plan renk aralıkları -->
  <div class="card">
    <h2>Arka Plan Renk Aralıkları</h2>
    <ul id="renk-list">
      <li id="renk-empty">Henüz aralık yok.</li>
    </ul>

    <div class="renk-ekle-form">
      <div>
        <label>Başlangıç</label><br>
        <input type="time" id="r-baslangic" value="09:00">
      </div>
      <div>
        <label>Bitiş</label><br>
        <input type="time" id="r-bitis" value="09:05">
      </div>
      <div>
        <label>Renk</label><br>
        <input type="color" id="r-renk" value="#cc0000">
      </div>
      <div style="padding-top:1.2rem">
        <button class="btn-primary" onclick="addRenk()">+ Ekle</button>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCY0nkNYkEUqQ-vFYFMtNLmtR1CiMxgcCk",
    authDomain: "kalibre-hedef.firebaseapp.com",
    databaseURL: "https://kalibre-hedef-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kalibre-hedef",
    storageBucket: "kalibre-hedef.firebasestorage.app",
    messagingSenderId: "410916627776",
    appId: "1:410916627776:web:7979504e9de837060206a5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── Mevcut değer ──
  onValue(ref(db, 'mesaj'), (snap) => {
    const data = snap.val();
    const cur = document.getElementById('current-text');
    if (data?.text) { cur.textContent = data.text; cur.classList.remove('empty'); }
    else { cur.textContent = '—'; cur.classList.add('empty'); }
  });

  // ── Geçmiş ──
  onValue(ref(db, 'gecmis'), (snap) => {
    const list = document.getElementById('history-list');
    const data = snap.val();
    if (!data) { list.innerHTML = '<li><span class="empty-msg">Henüz kayıt yok.</span></li>'; return; }
    const items = Object.values(data).reverse();
    list.innerHTML = '';
    items.forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="val">${item.text}</span><span class="time">${item.tarih || ''} ${item.saat || ''}</span>`;
      list.appendChild(li);
    });
  });

  // ── Gerçekleşen ──
  onValue(ref(db, 'gerceklesen'), (snap) => {
    const list = document.getElementById('actual-list');
    const data = snap.val();
    if (!data) { list.innerHTML = '<li><span class="empty-msg">Henüz giriş yok.</span></li>'; return; }
    const items = Object.values(data).reverse();
    list.innerHTML = '';
    items.forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="val green">${item.text}</span><span class="time">${item.tarih || ''} ${item.saat || ''}</span>`;
      list.appendChild(li);
    });
  });

  // ── Renk aralıkları ──
  onValue(ref(db, 'renkAraliklari'), (snap) => {
    const data = snap.val();
    const ul = document.getElementById('renk-list');
    const empty = document.getElementById('renk-empty');
    ul.innerHTML = '';
    if (!data) {
      const li = document.createElement('li');
      li.id = 'renk-empty';
      li.textContent = 'Henüz aralık yok.';
      li.style.cssText = 'color:#ccc;font-size:0.85rem;padding:0.4rem 0;';
      ul.appendChild(li);
      return;
    }
    Object.entries(data).forEach(([key, r]) => {
      const li = document.createElement('li');
      li.className = 'renk-row';
      li.innerHTML = `
        <span>${r.baslangic}</span>
        <span>${r.bitis}</span>
        <span class="renk-preview" style="background:${r.renk}"></span>
        <span style="font-size:0.8rem;color:#666">${r.renk}</span>
        <button class="btn-sm btn-danger" onclick="deleteRenk('${key}')">Sil</button>
      `;
      ul.appendChild(li);
    });
  });

  // ── Gönder ──
  window.send = async function() {
    const text = document.getElementById('msg').value.trim();
    if (!text) { status('Metin boş!', 'err'); return; }
    const now = new Date();
    try {
      await set(ref(db, 'mesaj'), { text, zaman: now.toLocaleTimeString('tr-TR') });
      await push(ref(db, 'gecmis'), { text, tarih: now.toLocaleDateString('tr-TR'), saat: now.toLocaleTimeString('tr-TR') });
      status('✓ Gönderildi!', 'ok');
      document.getElementById('msg').value = '';
      setTimeout(() => status('', ''), 3000);
    } catch(e) { status('Hata: ' + e.message, 'err'); }
  };

  window.clearScreen = async function() {
    await set(ref(db, 'mesaj'), { text: '', zaman: '' });
    status('Ekran temizlendi.', 'ok');
    setTimeout(() => status('', ''), 2000);
  };

  window.addActual = async function() {
    const input = document.getElementById('actual-input');
    const text = input.value.trim();
    if (!text) return;
    const now = new Date();
    await push(ref(db, 'gerceklesen'), { text, tarih: now.toLocaleDateString('tr-TR'), saat: now.toLocaleTimeString('tr-TR') });
    input.value = '';
  };

  window.addRenk = async function() {
    const bas = document.getElementById('r-baslangic').value;
    const bit = document.getElementById('r-bitis').value;
    const renk = document.getElementById('r-renk').value;
    if (!bas || !bit) return;
    await push(ref(db, 'renkAraliklari'), { baslangic: bas, bitis: bit, renk });
  };

  window.deleteRenk = async function(key) {
    await remove(ref(db, 'renkAraliklari/' + key));
  };

  function status(msg, cls) {
    const el = document.getElementById('send-status');
    el.textContent = msg; el.className = cls;
  }

  document.getElementById('msg').addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') window.send(); });
  document.getElementById('actual-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.addActual(); });
</script>
</body>
</html>
